<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockWorld - Мобильная аркадная игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div id="health-bar">
                <div id="health"></div>
                <span id="health-text">❤️ 10/10</span>
            </div>
            <div id="inventory">
                <div id="inventory-items"></div>
            </div>
            <div id="score">
                <span id="score-text">Блоков: 0</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="mobile-controls">
            <button id="btn-up" class="control-btn">⬆️</button>
            <div class="horizontal-controls">
                <button id="btn-left" class="control-btn">⬅️</button>
                <button id="btn-down" class="control-btn">⬇️</button>
                <button id="btn-right" class="control-btn">➡️</button>
            </div>
            <button id="btn-mine" class="action-btn">⛏️ Копать</button>
            <button id="btn-build" class="action-btn build">🧱 Строить</button>
            <button id="btn-jump" class="action-btn jump">🚀 Прыгать</button>
        </div>
        <div id="game-over" style="display:none;">
            <div class="game-over-content">
                <h1>GAME OVER</h1>
                <p id="final-score">Блоков собрано: 0</p>
                <button onclick="location.reload()">Играть снова</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
